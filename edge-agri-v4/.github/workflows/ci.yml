name: Edge-Agri CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3
    - name: Set up Python 3.11
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'
    - name: Install dependencies
      run: |
        pip install streamlit pillow numpy pandas bcrypt plotly
    - name: Check syntax
      run: |
        python -m py_compile app.py
        python -m py_compile utils/database.py
        python -m py_compile utils/rag_engine.py
        python -m py_compile utils/disease_detector.py
        python -m py_compile utils/translations.py
        echo "✅ All files syntax OK"
